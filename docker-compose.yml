services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stocklens_backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      FLASK_PORT: "5001"
    networks:
      - test_network


networks:
  test_network:
    external: true  # ← 동일한 외부 네트워크 참조