services:
  postgres:
    image: postgres:16-alpine
    container_name: stocklens_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: stocklens
      POSTGRES_USER: stocklens
      POSTGRES_PASSWORD: stocklens_pw
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stocklens -d stocklens"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
