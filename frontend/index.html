<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StockLens — 한국 주식 투자 인사이트</title>
  <meta name="description" content="KOSPI·KOSDAQ 종목 분석, 차트, 펀더멘털 지표, 투자 추천 서비스">

  <!-- CSS -->
  <link rel="stylesheet" href="/css/reset.css" />
  <link rel="stylesheet" href="/css/tokens.css" />
  <link rel="stylesheet" href="/css/components.css" />

  <!-- Pretendard (한국어 최적화 폰트) -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />

  <!-- Chart.js + Financial plugin -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/luxon@3.4.4/build/global/luxon.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1.3.1/dist/chartjs-adapter-luxon.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.1.1/dist/chartjs-chart-financial.min.js"></script>

  <style>
    /* 초기 로딩 화면 */
    #splash {
      position: fixed; inset: 0;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    .splash-logo {
      display: flex; align-items: center; gap: 10px;
      font-family: var(--font-family, sans-serif);
      font-size: 22px; font-weight: 700;
      color: #3182f6; letter-spacing: -0.02em;
    }
    .splash-spinner {
      width: 24px; height: 24px;
      border: 3px solid #e5e8eb;
      border-top-color: #3182f6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <!-- 초기 스플래시 -->
  <div id="splash">
    <div class="splash-logo">
      <svg width="32" height="32" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="8" fill="#3182f6"/>
        <polyline points="5,20 10,13 15,17 23,8" stroke="white" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      StockLens
    </div>
    <div class="splash-spinner"></div>
  </div>

  <!-- 앱 마운트 포인트 -->
  <div id="app"></div>

  <!-- 앱 진입점 -->
  <script type="module" src="/js/app.js"></script>
  <script>
    // 스플래시 제거
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash) {
          splash.classList.add('hide');
          setTimeout(() => splash.remove(), 300);
        }
      }, 400);
    });
  </script>
</body>
</html>
